<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>About Me</title>
<style type="text/css">
    body {
        margin: 0;
        padding: 0;
        background-color: #e0f2fe; /* Đồng bộ màu nền với Header */
        color: #475569;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 13px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-top: 2px solid #bae6fd;
        overflow: hidden;
        box-sizing: border-box;
    }

    .marquee-container {
        width: 100%;
        overflow: hidden;
        white-space: nowrap;
    }

    .marquee-text {
        display: inline-block;
        padding-left: 100%;
        animation: marqueeEffect 15s linear infinite;
        font-weight: 600;
    }

    .marquee-text em {
        font-style: normal;
        color: #0284c7; /* Tên màu xanh nổi bật, xinh xắn */
        font-weight: 700;
    }

    @keyframes marqueeEffect {
        0% { transform: translate3d(0, 0, 0); }
        100% { transform: translate3d(-100%, 0, 0); }
    }
</style>
</head>
<body>

    <div class="marquee-container">
        <span class="marquee-text">Thiết kế bởi: <em>Lê Thị Ánh Nguyệt - Lớp CN24CD</em> • Học phần: Thiết kế Web cá nhân ✨</span>
    </div>

</body>
</html>
