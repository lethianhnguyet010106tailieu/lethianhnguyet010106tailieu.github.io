<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Main Content</title>
<style type="text/css">
    body {
        margin: 0;
        padding: 40px 20px;
        background-color: #fafafa; /* Nền trắng kem dịu */
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
    }

    .main-card {
        background: #ffffff;
        padding: 40px;
        border-radius: 24px; /* Bo góc bo tròn bồng bềnh như đám mây */
        box-shadow: 0 10px 30px rgba(14, 165, 233, 0.05);
        text-align: center;
        max-width: 1050px;
        width: 100%;
        border-top: 5px solid #0284c7; /* Đường line xanh da trời ngọt ngào */
    }

    h2 {
        color: #0369a1;
        font-size: 26px;
        font-weight: 700;
        margin-top: 0;
        margin-bottom: 10px;
        letter-spacing: 0.5px;
    }

    p {
        color: #64748b;
        font-size: 14.5px;
        margin-bottom: 30px;
        font-weight: 500;
    }

    .gif-container {
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        overflow: hidden;
        border-radius: 16px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        border: 4px solid #f0f9ff;
    }

    .gif-container img {
        width: 100%;
        height: auto;
        display: block;
    }
</style>
</head>
<body>

    <div class="main-card">
        <h2>CHÀO MỪNG BẠN ĐẾN VỚI TRANG CHỦ</h2>
        <p>Vui lòng click chọn các bài tập ở menu bên trái để xem nội dung chi tiết nhé! ✨</p>
        
        
    </div>

</body>
</html>
