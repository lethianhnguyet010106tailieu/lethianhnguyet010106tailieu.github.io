<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Frame Title</title>
<style type="text/css">
    body {
        margin: 0;
        padding: 0;
        background-color: #e0f2fe; /* Xanh dương pastel dịu mát */
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #334155;
        height: 149px;
        display: flex;
        align-items: center;
        padding: 0 40px;
        box-sizing: border-box;
        border-bottom: 3px solid #bae6fd; /* Đường viền pastel đậm hơn chút */
    }

    .banner-container {
        display: flex;
        align-items: center;
        width: 100%;
        gap: 25px;
    }

    .avatar-box img {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 20px; /* Bo góc tròn nhiều hơn tạo nét dễ thương */
        box-shadow: 0 4px 15px rgba(14, 165, 233, 0.15);
        border: 3px solid #ffffff; /* Viền trắng dày xung quanh ảnh mèo */
    }

    .info-box {
        display: flex;
        flex-direction: column;
    }

    .info-box h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 700;
        color: #0369a1; /* Xanh sky sẫm */
        letter-spacing: 0.5px;
    }

    .info-box .sub-txt {
        margin: 4px 0 0 0;
        font-size: 14px;
        color: #64748b;
        font-weight: 500;
    }

    .info-box .subject {
        margin-top: 6px;
        font-size: 13px;
        color: #0284c7;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
</style>
</head>
<body>

    <div class="banner-container">
        <div class="avatar-box">
            <img src="avt.jpg.jpg" alt="Mèo GIF" width="3840">
        </div>
        <div class="info-box">
            <h1>Lê Thị Ánh Nguyệt</h1>
            <div class="sub-txt">Lớp: CN24CD</div>
            <div class="subject">Môn: Thiết Kế Web</div>
        </div>
    </div>

</body>
</html>
