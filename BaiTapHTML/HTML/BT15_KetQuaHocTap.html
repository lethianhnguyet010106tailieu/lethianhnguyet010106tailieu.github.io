<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kết quả học tập</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding-top: 30px;
        }

        .container {
            width: 650px;
            margin: auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: auto;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            font-size: 15px;
        }

        /* Thay màu xanh lime chói bằng màu xanh mint/emerald nhẹ nhàng hơn */
        .header {
            background-color: #2ecc71;
            color: white;
        }

        .footer {
            background-color: #e8f8f5;
            color: #27ae60;
            font-weight: bold;
        }

        .left {
            text-align: left;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>KẾT QUẢ HỌC TẬP</h2>

    <table>
        <tr class="header">
            <th rowspan="2">Họ và tên<br>Học Sinh</th>
            <th colspan="2">Năm Sinh</th>
            <th rowspan="2">Điểm TB</th>
            <th rowspan="2">Xếp Loại</th>
        </tr>

        <tr class="header">
            <th>Nam</th>
            <th>Nữ</th>
        </tr>

        <tr>
            <td class="left">Lê Thanh Xuân</td>
            <td></td>
            <td>1950</td>
            <td>8.5</td>
            <td>Giỏi</td>
        </tr>

        <tr>
            <td class="left">Phan Thế Hạ</td>
            <td>1985</td>
            <td></td>
            <td>6.5</td>
            <td>Khá</td>
        </tr>

        <tr>
            <td class="left">Trần Hoài Thu</td>
            <td></td>
            <td>1986</td>
            <td>9.5</td>
            <td>Xuất sắc</td>
        </tr>

        <tr>
            <td class="left">Trương Lưu Đông</td>
            <td>1984</td>
            <td></td>
            <td>6.0</td>
            <td>Trung Bình</td>
        </tr>

        <tr>
            <td class="left">Lưu Thế Mạc</td>
            <td>1985</td> <td></td>
            <td>4.5</td>
            <td>Kém</td>
        </tr>

        <tr class="footer">
            <td colspan="3">Tổng số học sinh đạt:</td>
            <td colspan="2">4 Học sinh</td>
        </tr>
    </table>
</div>

</body>
</html>
